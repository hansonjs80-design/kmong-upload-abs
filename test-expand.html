<!DOCTYPE html>
<html>
<head>
<style>
.cell {
  position: relative;
  width: 100px;
  height: 30px;
  border: 1px solid black;
  overflow: visible;
}
.sw-cell-input-wrapper {
  display: inline-grid;
  align-items: center;
  position: absolute;
  top: -1px;
  left: -1px;
  min-width: calc(100% + 2px);
  height: calc(100% + 2px);
  box-sizing: border-box;
  z-index: 101;
  border: 2px solid #1a73e8;
  background: white;
}
.sw-cell-input-wrapper::after,
.sw-cell-input {
  grid-area: 1 / 1;
  font-family: inherit;
  font-size: 13px;
  padding: 0 4px;
  margin: 0;
  box-sizing: border-box;
  white-space: pre;
  min-width: 100%;
}
.sw-cell-input-wrapper::after {
  content: attr(data-value) ' ';
  visibility: hidden;
}
.sw-cell-input {
  width: 100%;
  height: 100%;
  border: none !important;
  outline: none !important;
  background: transparent !important;
  color: #000;
}
</style>
</head>
<body>
  <div class="cell">
    <div class="sw-cell-input-wrapper" data-value="Very long text that should expand">
      <input class="sw-cell-input" value="Very long text that should expand" />
    </div>
  </div>
</body>
</html>
